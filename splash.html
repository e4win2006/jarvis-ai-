<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Starting JARVIS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020617;
      color: #06b6d4;
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(6, 182, 212, 0.25);
      border-radius: 8px;
      box-sizing: border-box;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
      margin: 0;
      text-transform: uppercase;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(6, 182, 212, 0.1);
      border-radius: 50%;
      border-top-color: #06b6d4;
      animation: spin 1s ease-in-out infinite;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }
    .subtitle {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1 class="title">JARVIS</h1>
    <div class="subtitle">Initializing System Cores...</div>
  </div>
</body>
</html>
